<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tu Carrito | Lumina</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <main>
        <h1>Tu Carrito de la Compra</h1>

        <div class="carrito-container">
            <table class="tabla-carrito">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio Ud.</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td>
                            <strong th:text="${item.product.name}"></strong>
                            <div class="configuracion-item" th:if="${!item.valores.isEmpty()}">
                                <ul>
                                    <li th:each="v : ${item.valores}">
                                        <span th:text="${v.campoPersonalizacion.name} + ': ' + ${v.valorTexto}"></span>
                                    </li>
                                </ul>
                            </div>
                        </td>
                        <td th:text="${item.precioCalculado} + ' €'"></td>
                        <td th:text="${item.cantidad}"></td>
                        <td th:text="${item.precioCalculado * item.cantidad} + ' €'"></td>
                        <td>
                            <form th:action="@{/carrito/eliminar/{id}(id=${item.id})}" method="post">
                                <button type="submit" class="btn-eliminar" style="background:none; border:none; color:red; cursor:pointer;">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${items.isEmpty()}">
                        <td colspan="5" style="text-align:center;">Tu carrito está vacío.</td>
                    </tr>
                </tbody>
                </table>
                
                <div class="resumen-pedido" th:if="${!items.isEmpty()}">
                    <p>Subtotal: <span th:text="${total} + ' €'"></span></p>
                    <p>Gastos de envío: Gratis</p>
                    <div class="total-destacado">Total: <span th:text="${total} + ' €'"></span></div>
                    <a href="#" class="btn-pagar">Finalizar Compra</a>
                </div>                
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
