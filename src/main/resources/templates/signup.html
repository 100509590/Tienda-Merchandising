<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta | Lumina</title>
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 2rem auto;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .auth-container h1 { color: var(--color-primario); margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-group input {
            width: 100%; padding: 0.8rem; border: 1px solid #ccc;
            border-radius: 5px; font-family: inherit; box-sizing: border-box;
        }
        .btn-auth {
            background-color: var(--color-texto); color: var(--color-texto-claro);
            border: none; padding: 1rem; font-size: 1.1rem; border-radius: 5px;
            cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s;
        }
        .btn-auth:hover { background-color: var(--color-primario); }
        .auth-links { margin-top: 1.5rem; font-size: 0.9rem; }
        .auth-links a { color: var(--color-primario); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <main>
        <div class="auth-container">
            <h1>Únete a Lumina</h1>
            <p>Crea tu cuenta para personalizar tus velas.</p>
            
            <form th:action="@{/signup}" method="post">
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div class="form-group">
                    <label for="passwordRepeat">Repetir Contraseña</label>
                    <input type="password" id="passwordRepeat" name="passwordRepeat" placeholder="Repite tu contraseña" required>
                </div>
                
                <button type="submit" class="btn-auth">Registrarse</button>
            </form>
            
            <div class="auth-links">
                <p>¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión aquí</a></p>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
