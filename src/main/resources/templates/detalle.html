<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto | Lumina</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <main>
        <div class="detalle-container">
            <div class="detalle-imagen">
                📸 Imagen de la Vela
            </div>

            <div class="detalle-info">
                <h1>Crea tu vela</h1>
                <p>Diseña tu propia vela eligiendo aroma, color, intensidad y packaging.</p>

                <div class="precio-destacado">
                    Total: <span id="precio-dinamico">9.90</span> €
                </div>

                <form action="#" method="post" class="formulario-personalizacion">

                    <div class="form-group">
                        <label for="aroma">1. Elige el Aroma:</label>
                        <select id="aroma" name="aroma">
                            <option value="0">Lavanda (+0.00€)</option>
                            <option value="1.5">Vainilla (+1.50€)</option>
                            <option value="2.0">Sándalo (+2.00€)</option>
                            <option value="1.0">Cítrico (+1.00€)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="intensidad">2. Intensidad:</label>
                        <select id="intensidad" name="intensidad">
                            <option value="0">Suave</option>
                            <option value="0">Media</option>
                            <option value="1.0">Fuerte (+1.00€)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">3. Mensaje Personalizado (Máx 40 caracteres):</label>
                        <input type="text" id="mensaje" name="mensaje" placeholder="Ej: Feliz aniversario..." maxlength="40">
                    </div>

                    <button type="submit" class="btn-comprar">Añadir al Carrito</button>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
