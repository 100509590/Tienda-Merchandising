<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>

    
    <nav th:fragment="navbar">
        <div class="logo">
            <a th:href="@{/}">🕯️ Lumina</a>
        </div>
        <div class="enlaces">
            <a th:href="@{/}">Catálogo</a>
            <a th:href="@{/carrito}">Carrito</a>

            

            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin}">Panel de Gestión</a>
            </span>

            <span sec:authorize="isAnonymous()">
                <a th:href="@{/login}">Iniciar Sesión</a>
            </span>

            <span sec:authorize="isAuthenticated()">
                <span th:text="${#authentication.principal.username}">Usuario</span>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" style="
                        background: none;
                        border: none;
                        color: var(--color-texto-claro);
                        cursor: pointer;
                        font-weight: bold;
                        font-size: 1rem;
                        margin-left: 1rem;
                        text-decoration: underline;
                    ">Cerrar sesión</button>
                </form>
            </span>
        </div>
    </nav>

    <footer th:fragment="footer">
        <p>&copy; 2026 Lumina - Tu tienda de velas artesanales.</p>
    </footer>

</body>
</html>
