<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | Lumina</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <main>
        <div class="auth-container">
            <h1>Bienvenido de nuevo</h1>
            <p>Inicia sesión para ver tus pedidos o guardar tu carrito.</p>

            <div th:if="${param.error}" class="error-msg">
                Correo o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="error-msg" style="background:#eaffea; border-color:green; color:green;">
                Sesión cerrada correctamente.
            </div>
            <div th:if="${param.registered}" class="error-msg" style="background:#eaffea; border-color:green; color:green;">
                Cuenta creada. Ya puedes iniciar sesión.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Correo Electrónico</label>
                    <input type="email" id="username" name="username" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-auth">Entrar</button>
            </form>

            <div class="auth-links">
                <p>¿No tienes cuenta? <a th:href="@{/signup}">Regístrate aquí</a></p>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
