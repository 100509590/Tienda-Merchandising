<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración | Lumina</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <main>
        <h1>Panel de Gestión</h1>

        <div class="admin-container">

            <section class="admin-card">
                <h2>Nueva Vela</h2>
                <form th:action="@{/admin/productos/nuevo}" method="post" class="form-admin">
                    <div class="form-group">
                        <label>Nombre:</label>
                        <input type="text" name="name" placeholder="Ej: Vela Oceánica" required>
                    </div>
                    <div class="form-group">
                        <label>Precio Base (€):</label>
                        <input type="number" step="0.01" name="precioBase" placeholder="10.00" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo:</label>
                        <select name="tipo">
                            <option value="FIJO">Fija (Estándar)</option>
                            <option value="PERSONALIZABLE">Personalizable</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Descripción:</label>
                        <textarea name="descripcion" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn-auth" style="padding: 0.7rem;">Guardar Producto</button>
                </form>
            </section>

            <section class="admin-card">
                <h2>Inventario</h2>
                <table class="tabla-admin">
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Tipo</th>
                        <th>Precio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                    <tbody>
                        <thead>
                            <tr th:each="p : ${productos}">
                                <td th:text="${p.id}"></td>
                                <td th:text="${p.name}"></td>
                                <td>
                                    <span th:class="${p.tipo == T(es.uc3m.tienda.model.Product.Tipo).FIJO}
                                                ? 'badge badge-fijo' : 'badge badge-perso'"
                                      th:text="${p.tipo}"></span>
                                </td>
                                <td th:text="${p.precioBase} + '€'"></td>
                                <td>
                                    <span th:if="${p.activo}">✅ Activo</span>
                                    <span th:unless="${p.activo}">⏸ Inactivo</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/productos/{id}/activar(id=${p.id})}"
                                        method="post" style="display:inline">
                                      <button th:if="${!p.activo}" class="btn-accion">Publicar</button>
                                    </form>
                                    <form th:action="@{/admin/productos/{id}/desactivar(id=${p.id})}"
                                        method="post" style="display:inline">
                                        <button th:if="${p.activo}" class="btn-accion">Retirar</button>
                                    </form>
                                    <form th:action="@{/admin/productos/{id}/borrar(id=${p.id})}"
                                        method="post" style="display:inline">
                                        <button class="btn-accion btn-borrar">Borrar</button>
                                    </form>
                                </td>
                            </tr>
                        </thead>                       
                    </tbody>
                </table>
            </section>

        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
