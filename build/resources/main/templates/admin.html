<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración | Lumina</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <main>
        <h1>Panel de Gestión</h1>

        <div class="admin-container">

            <section class="admin-card">
                <h2>Nueva Vela</h2>
                <form action="#" method="post" class="form-admin">
                    <div class="form-group">
                        <label>Nombre:</label>
                        <input type="text" name="nombre" placeholder="Ej: Vela Oceánica" required>
                    </div>
                    <div class="form-group">
                        <label>Precio Base (€):</label>
                        <input type="number" step="0.01" name="precio" placeholder="10.00" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo:</label>
                        <select name="tipo">
                            <option value="FIJO">Fija (Estándar)</option>
                            <option value="PERSONALIZABLE">Personalizable</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Descripción:</label>
                        <textarea name="descripcion" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn-auth" style="padding: 0.7rem;">Guardar Producto</button>
                </form>
            </section>

            <section class="admin-card">
                <h2>Inventario</h2>
                <table class="tabla-admin">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Tipo</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td><strong>Vela Relax</strong></td>
                            <td><span class="badge badge-fijo">FIJO</span></td>
                            <td>12.50€</td>
                            <td>✅ Activo</td>
                            <td>
                                <a href="#" class="btn-accion">Editar</a>
                                <a href="#" class="btn-accion btn-borrar">Borrar</a>
                            </td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td><strong>Crea tu vela</strong></td>
                            <td><span class="badge badge-perso">PERSO</span></td>
                            <td>9.90€</td>
                            <td>✅ Activo</td>
                            <td>
                                <a href="#" class="btn-accion">Editar</a>
                                <a href="#" class="btn-accion btn-borrar">Borrar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>

        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
