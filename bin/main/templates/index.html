<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lumina | Tienda de Velas Artesanales</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav th:replace="~{fragments :: navbar}"></nav>

    <main>
        <section class="hero">
            <h1>Ilumina tus momentos</h1>
            <p>Velas hechas a mano con ceras naturales y aromas únicos.</p>
        </section>

        <div class="contenedor-productos">

            <div th:each="p : ${productos}" class="card">
                <div class="card-img">️ Imagen</div>
                <div class="card-body">
                    <h3 th:text="${p.name}"></h3>
                    <p th:text="${p.description}"></p>
                    <p class="card-precio" th:text="${p.precioBase} + ' €'"></p>
                    <a th:href="@{/detalle/{id}(id=${p.id})}" class="btn-ver">Ver Detalles</a>
                </div>
            </div>
            
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
